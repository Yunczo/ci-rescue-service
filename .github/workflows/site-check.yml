name: Site and anonymous intake check

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/site-check.yml"
      - "docs/**"
      - "src/**"
      - "package.json"
      - "package-lock.json"
  pull_request:
    paths:
      - ".github/workflows/site-check.yml"
      - "docs/**"
      - "src/**"
      - "package.json"
      - "package-lock.json"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify-site:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: npm
      - name: Install pinned dependencies
        run: npm ci --ignore-scripts --no-audit --no-fund
      - name: Audit dependencies
        run: npm audit --audit-level=high
      - name: Rebuild browser assets
        run: npm run build:site
      - name: Run browser-tool tests
        run: npm test
      - name: Smoke-check the rebuilt bundles
        run: |
          test -s docs/assets/nostr-intake.js
          test -s docs/assets/log-triage.js
          grep -Fq '350390e2ddcb4d14a0802cff6c1ce47868871d6719cff65d4ecf9eca1bc276a3' docs/assets/nostr-intake.js
          grep -Fq 'anonymous-intake-form' docs/assets/nostr-intake.js
          grep -Fq 'log-triage-form' docs/assets/log-triage.js
          grep -Fq "connect-src 'none'" docs/tools/github-actions-log-triage.html
      - name: Parse every HTML page
        run: |
          python3 - <<'PY'
          from html.parser import HTMLParser
          from pathlib import Path

          for page in sorted(Path("docs").rglob("*.html")):
              parser = HTMLParser()
              parser.feed(page.read_text(encoding="utf-8"))
              parser.close()
              print(page)
          PY
