name: Site and anonymous intake check

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/site-check.yml"
      - "docs/**"
      - "src/**"
      - "package.json"
      - "package-lock.json"
  pull_request:
    paths:
      - ".github/workflows/site-check.yml"
      - "docs/**"
      - "src/**"
      - "package.json"
      - "package-lock.json"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify-site:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - name: Install pinned dependencies
        run: npm ci --ignore-scripts --no-audit --no-fund
      - name: Audit dependencies
        run: npm audit --audit-level=high
      - name: Rebuild the browser intake
        run: npm run build:intake
      - name: Confirm the committed bundle is reproducible
        run: git diff --exit-code -- docs/assets/nostr-intake.js
      - name: Parse the landing page
        run: python3 -c 'from html.parser import HTMLParser; p=HTMLParser(); p.feed(open("docs/index.html", encoding="utf-8").read()); p.close()'
