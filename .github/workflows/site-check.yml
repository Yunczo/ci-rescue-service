name: Site and anonymous intake check

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/site-check.yml"
      - "docs/**"
      - "src/**"
      - "package.json"
      - "package-lock.json"
  pull_request:
    paths:
      - ".github/workflows/site-check.yml"
      - "docs/**"
      - "src/**"
      - "package.json"
      - "package-lock.json"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify-site:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: npm
      - name: Install pinned dependencies
        run: npm ci --ignore-scripts --no-audit --no-fund
      - name: Audit dependencies
        run: npm audit --audit-level=high
      - name: Rebuild the browser intake
        run: npm run build:intake
      - name: Smoke-check the rebuilt bundle
        run: |
          test -s docs/assets/nostr-intake.js
          grep -Fq '350390e2ddcb4d14a0802cff6c1ce47868871d6719cff65d4ecf9eca1bc276a3' docs/assets/nostr-intake.js
          grep -Fq 'anonymous-intake-form' docs/assets/nostr-intake.js
      - name: Parse the landing page
        run: python3 -c 'from html.parser import HTMLParser; p=HTMLParser(); p.feed(open("docs/index.html", encoding="utf-8").read()); p.close()'
