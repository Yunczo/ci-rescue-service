name: Fixed CI example

on:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test

  verify:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - run: echo "Build completed"
