<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CI Rescue social card</title>
  <style>
    :root {
      --ink: #f7f4ea;
      --muted: #b8b9b4;
      --green: #75e6a5;
      --amber: #ffc56e;
      --panel: #151a1d;
      --line: rgba(255, 255, 255, .14);
    }

    * { box-sizing: border-box; }
    html, body { width: 1200px; height: 630px; margin: 0; overflow: hidden; }
    body {
      color: var(--ink);
      background:
        radial-gradient(circle at 10% 8%, rgba(38, 153, 91, .3), transparent 390px),
        radial-gradient(circle at 92% 84%, rgba(199, 120, 32, .18), transparent 390px),
        #0d0f11;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
    }

    .frame {
      position: relative;
      display: grid;
      grid-template-columns: 1.35fr .65fr;
      gap: 58px;
      width: 100%;
      height: 100%;
      padding: 62px 68px 58px;
    }

    .frame::before {
      content: "";
      position: absolute;
      inset: 28px;
      border: 1px solid var(--line);
      border-radius: 24px;
      pointer-events: none;
    }

    .copy { align-self: center; }
    .eyebrow {
      margin-bottom: 24px;
      color: var(--green);
      font-size: 18px;
      font-weight: 800;
      letter-spacing: .17em;
      text-transform: uppercase;
    }

    h1 {
      max-width: 720px;
      margin: 0;
      font-size: 72px;
      line-height: .98;
      letter-spacing: -.065em;
    }

    .sub {
      max-width: 690px;
      margin: 28px 0 0;
      color: #d6d5cf;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 25px;
      line-height: 1.35;
    }

    .url {
      position: absolute;
      left: 68px;
      bottom: 52px;
      color: var(--muted);
      font-size: 17px;
      letter-spacing: -.02em;
    }

    .offer {
      align-self: center;
      padding: 34px 32px;
      border: 1px solid rgba(117, 230, 165, .34);
      border-radius: 20px;
      background: linear-gradient(145deg, rgba(117, 230, 165, .1), rgba(21, 26, 29, .94));
      box-shadow: 0 24px 70px rgba(0, 0, 0, .28);
    }

    .price {
      display: block;
      color: var(--green);
      font-size: 88px;
      font-weight: 900;
      line-height: .95;
      letter-spacing: -.08em;
    }

    .fixed {
      display: block;
      margin: 12px 0 26px;
      color: var(--amber);
      font-size: 18px;
      font-weight: 800;
      letter-spacing: .08em;
      text-transform: uppercase;
    }

    .offer p {
      margin: 0;
      padding: 14px 0;
      border-top: 1px solid var(--line);
      color: #d8d8d2;
      font-size: 18px;
      line-height: 1.3;
    }

    .offer p:last-child { padding-bottom: 0; }
    .mark { color: var(--green); }
  </style>
</head>
<body>
  <main class="frame">
    <section class="copy">
      <div class="eyebrow">CI Rescue · GitHub Actions</div>
      <h1>Repair one workflow—or migrate it to Node 24.</h1>
      <p class="sub">A focused diagnosis or migration review, a reviewable patch, and verification evidence.</p>
      <div class="url">yunczo.github.io/ci-rescue-service</div>
    </section>
    <aside class="offer" aria-label="Fixed-scope offer">
      <span class="price">$49</span>
      <span class="fixed">Fixed scope</span>
      <p><span class="mark">✓</span> One workflow</p>
      <p><span class="mark">✓</span> Two-day delivery</p>
      <p><span class="mark">✓</span> One revision</p>
      <p><span class="mark">✓</span> No credentials</p>
    </aside>
  </main>
</body>
</html>
